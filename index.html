<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幼兒健康識能測驗</title>
<link rel="stylesheet" href="styles.css?v=20260602-final3">
</head>
<body>
<section id="welcomeView" class="quiz-view">
    <h1 class="main-title">幼兒健康問卷</h1>
    <p class="form-label">請選擇幼兒班別</p>
    <select id="classLevelSelect">
        <option value="" disabled selected>--- 點擊選擇班別 ---</option>
        <option value="大班">大班</option>
        <option value="中班">中班</option>
        <option value="小班">小班</option>
    </select>
    <p class="form-label">請施測者輸入受試者編碼</p>
    <input type="text" id="userNameInput" placeholder="在此輸入座號或學號">
    <button class="primary" id="startButton" type="button">開始測驗</button>
</section>

<section id="quizView" class="quiz-view hidden">
    <div class="quiz-header">
        <span id="currentNum" class="current-num">1/3</span>
        <div class="header-btns">
            <button id="prevButton" class="control-btn" type="button">上一題</button>
            <button id="replayButton" class="control-btn" type="button">重聽題目</button>
            <button id="nextButton" class="next-btn" type="button" disabled>下一題</button>
        </div>
    </div>

    <h2 id="questionPrompt" class="question-prompt">載入中...</h2>

    <div class="options-grid">
        <div class="picture-option" id="optionA">
            <div class="image-frame"><img id="imageA" src="" alt="選項A"></div>
            <div class="option-footer">
                <p id="labelA" class="option-label"></p>
                <button class="btn-audio-small" id="btnAudioA" type="button">播放</button>
            </div>
        </div>

        <div class="picture-option" id="optionB">
            <div class="image-frame"><img id="imageB" src="" alt="選項B"></div>
            <div class="option-footer">
                <p id="labelB" class="option-label"></p>
                <button class="btn-audio-small" id="btnAudioB" type="button">播放</button>
            </div>
        </div>
    </div>

    <button id="unknownButton" class="unknown-btn" type="button">不知道</button>
</section>

<section id="doneView" class="quiz-view done-view hidden">
    <h2 class="done-title">完成作答！</h2>
    <p class="done-text">謝謝你的參與，資料已成功送出。</p>
    <button class="primary restart-btn" onclick="location.reload()" type="button">返回首頁</button>
</section>

<script src="app.js?v=20260602-final3"></script>
</body>
</html>
