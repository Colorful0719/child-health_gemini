<section class="hidden" id="quizView">
    <header class="quiz-header">
        <p id="categoryLabel" class="eyebrow"></p>
        <h2 id="questionPrompt"></h2>
        <button class="replay-btn" id="replayButton">🔊 重聽題目</button>
    </header>

    <div class="quiz-options">
        <button class="option-card" id="optionA">
            <img id="imageA" src="" alt="">
            <div class="label-row"><span id="labelA"></span><button class="audio-btn" id="audioA">▶</button></div>
        </button>
        <button class="option-card" id="optionB">
            <img id="imageB" src="" alt="">
            <div class="label-row"><span id="labelB"></span><button class="audio-btn" id="audioB">▶</button></div>
        </button>
    </div>

    <button class="unknown-button" id="unknownButton">不知道</button>
</section>
