<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒健康圖像式問卷</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section id="welcomeView">
            <h1>幼兒健康圖像式問卷</h1>
            <input id="displayName" type="text" placeholder="請輸入班級或姓名">
            <br><br>
            <button class="primary-action" id="startButton">開始問卷</button>
        </section>

        <section id="quizView" class="hidden">
            <header class="quiz-header">
                <p id="categoryLabel"></p>
                <h2 id="questionPrompt">載入中...</h2>
                <button class="replay-btn" id="replayButton" type="button">🔊 重聽題目</button>
            </header>
            <div class="quiz-options">
                <button class="option-card" id="optionA" type="button">
                    <img id="imageA" src="" alt="">
                    <div class="label-row"><span id="labelA"></span><button class="audio-btn" id="audioA" type="button">▶</button></div>
                </button>
                <button class="option-card" id="optionB" type="button">
                    <img id="imageB" src="" alt="">
                    <div class="label-row"><span id="labelB"></span><button class="audio-btn" id="audioB" type="button">▶</button></div>
                </button>
            </div>
            <button class="unknown-button" id="unknownButton" type="button">不知道</button>
        </section>

        <section id="doneView" class="hidden">
            <h2>完成作答！</h2>
            <button class="primary-action" id="restartButton">重新開始</button>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
