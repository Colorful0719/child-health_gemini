<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒健康識能測驗</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section id="welcomeView" class="quiz-view">
        <h1 style="font-size: 2.5rem;">😊</h1>
        <h1 style="color: var(--green);">幼兒健康問卷</h1>
        <p style="color: #666; font-size: 1.2rem; margin-bottom: 5px;">請選擇幼兒班別</p>
        <select id="classLevelSelect">
            <option value="" disabled selected>--- 點擊選擇班別 ---</option>
            <option value="大班">大班</option>
            <option value="中班">中班</option>
            <option value="小班">小班</option>
        </select>
        <p style="color: #666; font-size: 1.2rem; margin-bottom: 5px;">請施測者輸入受試者編碼</p>
        <input type="text" id="userNameInput" placeholder="在此輸入座號或學號">
        <button class="primary" id="startButton">開始測驗</button>
    </section>

    <section id="quizView" class="quiz-view hidden">
        <div class="quiz-header">
            <span><span id="currentNum">1 / 42</span></span>
            <div class="header-btns">
                <button id="prevButton" class="control-btn" style="display:none;">⬅ 上一題</button>
                <button id="replayButton" class="control-btn">🔊 重聽題目</button>
                <button id="nextButton" class="control-btn">下一題 ➡</button>
            </div>
        </div>
        <h2 id="questionPrompt" style="margin: 20px 0; font-size: 1.8rem; color: #333;">載入中...</h2>
        <div class="options-grid">
            <div class="picture-option" id="optionA">
                <div class="image-frame"><img id="imageA" src="" alt="選項A"></div>
                <div class="option-footer">
                    <p id="labelA" class="option-label"></p>
                    <button class="btn-audio-small" id="btnAudioA" type="button">▶</button>
                </div>
            </div>
            <div class="picture-option" id="optionB">
                <div class="image-frame"><img id="imageB" src="" alt="選項B"></div>
                <div class="option-footer">
                    <p id="labelB" class="option-label"></p>
                    <button class="btn-audio-small" id="btnAudioB" type="button">▶</button>
                </div>
            </div>
        </div>
        <button id="unknownButton" class="unknown-btn">不知道</button>
    </section>

    <section id="doneView" class="quiz-view hidden" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h2 style="font-size: 5rem;">✅</h2>
        <h2 style="color: var(--green);">完成作答！</h2>
        <p style="color: #666;">謝謝你的參與，資料已成功送出。</p>
        <button class="primary" onclick="location.reload()" style="max-width: 300px; margin-top: 30px;">返回首頁</button>
    </section>

    <script src="app.js"></script>
</body>
</html>
