<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒健康問卷</title>
    <style>
        :root { --green: #2c7a5b; --bg: #e9f5f0; --line: #d8e1e8; --coral: #f8d7cf; }
        body { margin: 0; background: var(--bg); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; }
        .hidden { display: none !important; }
        .quiz-view { background: white; border-radius: 20px; padding: 30px; margin-top: 20px; width: 90%; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 80%; padding: 15px; font-size: 1.4rem; margin: 20px 0; border: 2px solid var(--line); border-radius: 12px; text-align: center; }
        button.primary { background: var(--green); color: white; border: 0; padding: 18px; font-size: 1.5rem; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-btns { display: flex; gap: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .picture-option { border: 3px solid var(--line); border-radius: 15px; padding: 10px; cursor: pointer; transition: transform 0.2s; }
        .picture-option:active { transform: scale(0.98); }
        .image-frame img { width: 100%; height: auto; max-height: 35vh; object-fit: contain; }
        .unknown-btn { position: fixed; right: 20px; bottom: 20px; background: var(--coral); border: 2px solid var(--line); padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 100; }
        .prev-btn { background: white; border: 1px solid var(--line); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <section id="welcomeView" class="quiz-view">
        <h1>😊 幼兒健康問卷</h1>
        <p style="color: #666;">請輸入您的編碼 (例如座號)</p>
        <input type="text" id="userNameInput" placeholder="在此輸入">
        <button class="primary" id="startButton">進入測驗</button>
    </section>

    <section id="quizView" class="quiz-view hidden">
        <div class="quiz-header">
            <span style="font-size: 1.3rem; font-weight: bold;"><span id="currentNum">1</span> / 42</span>
            <div class="header-btns">
                <button id="prevButton" class="prev-btn" style="display:none;">⬅ 上一題</button>
                <button id="replayButton" class="prev-btn">🔊 重聽題目</button>
            </div>
        </div>
        <h2 id="questionPrompt" style="margin: 20px 0; min-height: 1.2em;">載入中...</h2>
        <div class="options-grid">
            <div class="picture-option" id="optionA">
                <div class="image-frame"><img id="imageA" src=""></div>
                <p id="labelA" style="font-size: 1.4rem; font-weight: bold;"></p>
            </div>
            <div class="picture-option" id="optionB">
                <div class="image-frame"><img id="imageB" src=""></div>
                <p id="labelB" style="font-size: 1.4rem; font-weight: bold;"></p>
            </div>
        </div>
        <button id="unknownButton" class="unknown-btn">不知道</button>
    </section>

    <section id="doneView" class="quiz-view hidden">
        <h2 style="font-size: 4rem;">✅</h2>
        <h2>完成作答！</h2>
        <p>謝謝你的參與，資料已成功送出。</p>
        <button class="primary" onclick="location.reload()" style="margin-top: 20px;">返回首頁</button>
    </section>

    <script src="app.js"></script>
</body>
</html>
