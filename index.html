<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>幼兒健康圖像式問卷</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="welcome-view" id="welcomeView" aria-labelledby="appTitle">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">✓</div>
          <div>
            <p class="eyebrow">幼兒健康圖像式問卷</p>
            <h1 id="appTitle" class="sr-only">幼兒健康圖像式問卷</h1>
          </div>
        </div>
        <div class="start-panel">
          <label for="displayName">填答者名稱或班級</label>
          <input id="displayName" type="text" autocomplete="off" placeholder="可留空，系統會自動編號">
          <label for="classLevel">級別</label>
          <select id="classLevel">
            <option value="大班">大班</option>
            <option value="中班">中班</option>
            <option value="小班">小班</option>
          </select>
          <div class="welcome-actions">
            <button class="primary-action" id="startButton" type="button">開始</button>
            <button class="secondary-action" id="openAdminButton" type="button">後台管理</button>
          </div>
        </div>
      </section>

      <section class="quiz-view hidden" id="quizView" aria-live="polite">
        <header class="quiz-header">
          <div>
            <p class="eyebrow" id="categoryLabel">衛生</p>
            <h2 id="questionText">題目</h2>
          </div>
          <div class="status-box">
            <span id="userBadge">KID-0001</span>
            <strong id="progressText">1 / 42</strong>
          </div>
        </header>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="speech-row">
          <button class="icon-button" id="replayButton" type="button" aria-label="重播題目與選項">
            <span aria-hidden="true">▶</span>
          </button>
          <span>點一下可以再聽一次題目與選項</span>
        </div>

        <div class="options-grid" id="optionsGrid"></div>
        <button class="unknown-button" id="unknownButton" type="button">不知道</button>
      </section>

      <section class="done-view hidden" id="doneView">
        <div class="done-symbol" aria-hidden="true">✓</div>
        <h2>完成作答</h2>
        <p id="doneText">資料已記錄。</p>
        <button class="secondary-action" id="restartButton" type="button">新增下一位填答者</button>
      </section>

      <section class="admin-view hidden" id="adminView" aria-labelledby="adminTitle">
        <div class="admin-header">
          <div>
            <p class="eyebrow">後台</p>
            <h2 id="adminTitle">填答紀錄</h2>
          </div>
          <div class="admin-actions">
            <button class="secondary-action compact" id="backToSurveyButton" type="button">返回作答</button>
            <button class="secondary-action compact hidden" id="downloadCsvButton" type="button">下載 CSV</button>
            <button class="secondary-action compact hidden" id="refreshAdminButton" type="button">重新整理</button>
          </div>
        </div>

        <div class="admin-login" id="adminLogin">
          <label for="adminPassword">後台密碼</label>
          <div class="admin-login-row">
            <input id="adminPassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="請輸入密碼">
            <button class="primary-action compact" id="adminLoginButton" type="button">進入後台</button>
          </div>
          <p id="adminLoginMessage" class="admin-message"></p>
        </div>

        <div class="admin-content hidden" id="adminContent">
          <section class="admin-section" aria-labelledby="overviewTitle">
            <h3 id="overviewTitle">概覽統計</h3>
            <div class="stat-grid" id="overviewStats"></div>
            <div class="admin-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>題號</th>
                    <th>主題</th>
                    <th>題目</th>
                    <th>填答統計</th>
                  </tr>
                </thead>
                <tbody id="overviewRows">
                  <tr><td colspan="4">尚無資料</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="admin-section" aria-labelledby="respondentTitle">
            <h3 id="respondentTitle">填答者管理</h3>
            <div class="admin-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>編號</th>
                    <th>名稱/班級</th>
                    <th>級別</th>
                    <th>開始時間</th>
                    <th>完成時間</th>
                    <th>作答數</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="respondentRows">
                  <tr><td colspan="7">尚無資料</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="admin-section" aria-labelledby="detailTitle">
            <h3 id="detailTitle">詳細記錄</h3>
            <div class="admin-table-wrap">
              <table id="detailTable">
                <thead id="detailHead"></thead>
                <tbody id="detailRows">
                  <tr><td>尚無資料</td></tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
