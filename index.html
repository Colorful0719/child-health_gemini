<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼兒健康問卷</title>
    <style>
        :root { --green: #2c7a5b; --bg: #e9f5f0; --line: #d8e1e8; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; justify-content: center; }
        .hidden { display: none !important; }
        .quiz-view { background: white; border-radius: 20px; padding: 30px; margin-top: 20px; width: 90%; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 80%; padding: 15px; font-size: 1.2rem; margin: 20px 0; border: 2px solid var(--line); border-radius: 10px; }
        button.primary { background: var(--green); color: white; border: 0; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; width: 100%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .picture-option { border: 2px solid var(--line); padding: 10px; border-radius: 10px; cursor: pointer; }
        .image-frame img { width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body>
    <main style="width: 100%; display: flex; justify-content: center;">
        <section id="welcomeView" class="quiz-view">
            <h1>😊 幼兒健康問卷</h1>
            <p>請輸入您的編碼</p>
            <input type="text" id="userNameInput" placeholder="例如座號或學號">
            <button class="primary" id="startButton">進入測驗</button>
        </section>

        <section id="quizView" class="quiz-view hidden">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                <span id="currentNum">1</span> / 42
                <button id="prevButton" style="display:none;">⬅ 上一題</button>
            </div>
            <h2 id="questionPrompt">載入中...</h2>
            <div class="options-grid">
                <div class="picture-option" id="optionA">
                    <div class="image-frame"><img id="imageA" src=""></div>
                    <p id="labelA"></p>
                </div>
                <div class="picture-option" id="optionB">
                    <div class="image-frame"><img id="imageB" src=""></div>
                    <p id="labelB"></p>
                </div>
            </div>
            <button id="unknownButton" style="margin-top:20px; background:#f8d7cf; border:0; padding:10px 20px; border-radius:20px;">不知道</button>
        </section>

        <section id="doneView" class="quiz-view hidden">
            <h2>✅ 完成！</h2>
            <button class="primary" onclick="location.reload()">返回首頁</button>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
